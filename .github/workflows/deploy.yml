name: Deploy

# Triggered on main push (i.e. after PR merge) and manual dispatch.
# Each job individually skips if its GitHub Secrets/Variables aren't set, so
# the workflow is safe to merge before secrets are configured.
#
# Required repo-level config (Settings → Secrets and variables → Actions):
#
#   Variables:
#     SUPABASE_PROJECT_ID     e.g. abcdefghijklmnop
#     VERCEL_ORG_ID           optional, only if deploying to Vercel
#     VERCEL_PROJECT_ID       optional, only if deploying to Vercel
#
#   Secrets:
#     SUPABASE_ACCESS_TOKEN   personal access token, https://supabase.com/dashboard/account/tokens
#     SUPABASE_DB_PASSWORD    DB password for `supabase db push`
#     VERCEL_TOKEN            optional, only if deploying to Vercel
#     PROD_VITE_PUBLIC_SUPABASE_URL   passed to `vite build` at deploy time
#     PROD_VITE_PUBLIC_SUPABASE_ANON_KEY
#     PROD_VITE_PUBLIC_TOSS_CLIENT_KEY

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  supabase:
    name: Supabase (migrations + functions)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check Supabase secrets
        id: check
        env:
          PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
          ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$PROJECT_ID" ] || [ -z "$ACCESS_TOKEN" ]; then
            echo "::notice::Supabase deploy skipped — SUPABASE_PROJECT_ID or SUPABASE_ACCESS_TOKEN missing."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - uses: supabase/setup-cli@v1
        if: steps.check.outputs.skip != 'true'
        with:
          version: latest

      - name: Link Supabase project
        if: steps.check.outputs.skip != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_ID }}

      - name: Push database migrations
        if: steps.check.outputs.skip != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push

      - name: Deploy Edge Functions
        if: steps.check.outputs.skip != 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy --project-ref ${{ vars.SUPABASE_PROJECT_ID }}

  vercel:
    name: Vercel (frontend)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: supabase
    steps:
      - name: Check Vercel secrets
        id: check
        env:
          TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          ORG_ID: ${{ vars.VERCEL_ORG_ID }}
        run: |
          if [ -z "$TOKEN" ] || [ -z "$PROJECT_ID" ] || [ -z "$ORG_ID" ]; then
            echo "::notice::Vercel deploy skipped — VERCEL_TOKEN, VERCEL_PROJECT_ID, or VERCEL_ORG_ID missing."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - uses: actions/setup-node@v4
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci --legacy-peer-deps

      - name: Install Vercel CLI
        if: steps.check.outputs.skip != 'true'
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        if: steps.check.outputs.skip != 'true'
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        if: steps.check.outputs.skip != 'true'
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
          VITE_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_VITE_PUBLIC_SUPABASE_URL }}
          VITE_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_VITE_PUBLIC_SUPABASE_ANON_KEY }}
          VITE_PUBLIC_TOSS_CLIENT_KEY: ${{ secrets.PROD_VITE_PUBLIC_TOSS_CLIENT_KEY }}
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy
        if: steps.check.outputs.skip != 'true'
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
